<section class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="glass-card p-4 p-lg-5">
      <p class="section-label mb-2">Reset lozinke</p>
      <h2 class="h3 mb-3">Zaboravljena lozinka</h2>
      <p class="text-muted mb-4">Unesi email adresu i sistem će poslati link za postavljanje nove lozinke.</p>

      <form class="row g-3" (ngSubmit)="submit()">
        <div class="col-12">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" [(ngModel)]="email" required />
        </div>
        <div class="col-12 d-grid">
          <button class="btn btn-brand" type="submit">Pošalji reset link</button>
        </div>
      </form>

      @if (message) {
        <div class="alert alert-info mt-3 mb-0">{{ message }}</div>
      }

      @if (resetUrl) {
        <div class="mt-3">
          <div class="small text-muted">Demo reset link (validan 24h):</div>
          <a class="link-light" [href]="resetUrl">{{ resetUrl }}</a>
        </div>
      }
    </div>
  </div>
</section>
